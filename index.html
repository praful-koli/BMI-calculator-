<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>BMI Calculator</h1>
        <button id="historyBtn">📋 History <span class="history-badge" id="historyCount">0</span></button>
    </header>

    <div class="card">
        <h3>UNITS</h3>
        <div class="units">
            <button id="metricBtn" class="active">Metric (cm / kg)</button>
            <button id="imperialBtn">Imperial (ft / lbs)</button>
        </div>

        <h3>YOUR DETAILS</h3>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="eg. Praful" autocomplete="off">
        <span class="err-msg" id="err-name">⚠ Full name is required</span>

        <div id="metricInputs">
            <div class="row">
                <div>
                    <label>Height</label>
                    <input type="number" id="heightCm" placeholder="Height (cm)" autocomplete="off">
                    <span class="err-msg" id="err-heightCm">⚠ Height is required</span>
                </div>
                <div>
                    <label>Weight</label>
                    <input type="number" id="weightKg" placeholder="Weight (kg)" autocomplete="off">
                    <span class="err-msg" id="err-weightKg">⚠ Weight is required</span>
                </div>
            </div>
        </div>

        <div id="imperialInputs" class="hide">
            <div class="row">
                <div>
                    <label>Feet</label>
                    <input type="number" id="feet" placeholder="5" autocomplete="off">
                    <span class="err-msg" id="err-feet">⚠ Feet is required</span>
                </div>
                <div>
                    <label>Inches</label>
                    <input type="number" id="inches" placeholder="9" autocomplete="off">
                </div>
                <div>
                    <label>Weight</label>
                    <input type="number" id="weightLbs" placeholder="154" autocomplete="off">
                    <span class="err-msg" id="err-weightLbs">⚠ Weight is required</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div>
                <label>Age</label>
                <input type="number" id="age" placeholder="20" autocomplete="off">
                <span class="err-msg" id="err-age">⚠ Age is required</span>
            </div>
            <div>
                <label>Gender</label>
                <div class="gender">
                    <button id="maleBtn" class="active"><span>♂</span> Male</button>
                    <button id="femaleBtn"><span>♀</span> Female</button>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="calcBtn">Calculate BMI</button>
            <button id="resetBtn">↺ Reset</button>
        </div>
    </div>

    <div id="resultCard" class="result hide">
        <div class="card-header"><h2>Your Result</h2></div>
        <div class="card-body">
            <div id="bmiValue" class="bmi-value">0</div>
            <div class="bmi-status"><span id="bmiStatusSpan"></span></div>
            <div id="bmiInfo" class="bmi-info"></div>
        </div>
    </div>

</div>

<div id="historyModal" class="modal hide">
    <div class="modal-content">
        <span id="closeHistory" class="close">&times;</span>
        <h2>BMI History</h2>
        <ul id="historyList"></ul>
        <button id="deleteAllHistory" class="delete-all">🗑 Delete All</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
